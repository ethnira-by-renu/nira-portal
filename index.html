<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nira by Ethnira | Business Portal</title>
    <style>
        :root {
            --primary: #2563eb;
            --secondary: #10b981;
            --danger: #ef4444;
            --bg: #f8fafc;
            --text: #1e293b;
            --border: #e2e8f0;
        }

        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }

        /* Navigation Tabs */
        .tabs { display: flex; gap: 10px; margin-bottom: 2rem; border-bottom: 2px solid var(--border); overflow-x: auto; padding-bottom: 5px; }
        .tab-btn { padding: 10px 20px; cursor: pointer; border: none; background: none; font-weight: 600; color: #64748b; transition: 0.3s; white-space: nowrap; }
        .tab-btn.active { color: var(--primary); border-bottom: 2px solid var(--primary); margin-bottom: -2px; }

        /* Form Visibility */
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        /* Grid System */
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.2rem; margin-bottom: 1rem; }
        .full-width { grid-column: span 2; }

        label { display: block; margin-bottom: 0.4rem; font-size: 0.875rem; font-weight: 600; color: #475569; }
        input, select, textarea { 
            width: 100%; padding: 0.75rem; border: 1px solid var(--border); border-radius: 6px; 
            box-sizing: border-box; font-size: 1rem; transition: border 0.2s;
        }
        input:focus { border-color: var(--primary); outline: none; }
        input[readonly] { background: #f1f5f9; cursor: not-allowed; }

        /* Dynamic Blocks */
        .component-block { border: 1px solid var(--border); padding: 1.5rem; border-radius: 8px; margin-bottom: 1.5rem; background: #fafafa; position: relative; }
        .remove-btn { background: var(--danger); color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; float: right; font-size: 0.75rem; }
        
        /* Buttons */
        .btn-add { background: var(--secondary); color: white; border: none; padding: 0.75rem 1.5rem; border-radius: 6px; cursor: pointer; font-weight: 600; margin-bottom: 1rem; }
        .btn-submit { margin-top: 2rem; width: 100%; background: var(--primary); color: white; padding: 1rem; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; font-size: 1rem; }
        .btn-submit:disabled { background: #94a3b8; cursor: not-allowed; }

        /* Summary Sections */
        .summary-box { margin-top: 1rem; padding: 1.5rem; background: #eff6ff; border-radius: 8px; border: 1px solid #dbeafe; }

        @media (max-width: 600px) { .form-grid { grid-template-columns: 1fr; } .full-width { grid-column: span 1; } }
    </style>
</head>
<body>

<div class="container">
    <div class="tabs">
        <button class="tab-btn active" onclick="showTab('inventory')">Inventory</button>
        <button class="tab-btn" onclick="showTab('outfit-cost')">Outfit Cost</button>
        <button class="tab-btn" onclick="showTab('outfit-price')">Outfit Price</button>
        <button class="tab-btn" onclick="showTab('investment')">Investment</button>
    </div>

    <form id="inventory-form" class="tab-content active">
        <div class="form-grid">
            <div><label>Fabric ID</label><input type="text" placeholder="Auto-gen on save" readonly></div>
            <div><label>Date</label><input type="date" class="current-date" required></div>
            <div class="full-width"><label>Fabric Name</label><input type="text" name="fabName" required></div>
            <div class="full-width"><label>Fabric Photo (Drive)</label><input type="file" accept="image/*"></div>
            <div><label>Rate per Meter</label><input type="number" id="inv-rate" step="0.01" oninput="calcInvTotal()" required></div>
            <div><label>Total Meters Taken</label><input type="number" id="inv-meters" step="0.01" oninput="calcInvTotal()" required></div>
            <div class="full-width"><label>Total Amount</label><input type="number" id="inv-total" readonly></div>
        </div>
        <button type="submit" class="btn-submit">Add to Inventory</button>
    </form>

    <form id="outfit-cost-form" class="tab-content">
        <div class="form-grid">
            <div><label>Outfit ID</label><input type="text" placeholder="Auto-gen on save" readonly></div>
            <div><label>Date</label><input type="date" class="current-date" required></div>
        </div>
        <div id="component-list">
            <div class="component-block">
                <button type="button" class="remove-btn" onclick="removeComp(this)">Remove</button>
                <div class="form-grid">
                    <div><label>Fabric ID</label><select class="sel-fab" onchange="fetchFabDetails(this)" required><option value="">Select Fabric</option></select></div>
                    <div><label>Fabric Name</label><input type="text" class="res-name" readonly></div>
                    <div><label>Rate/m</label><input type="number" class="res-rate" readonly></div>
                    <div><label>Meters Used</label><input type="number" class="inp-used" step="0.01" oninput="calcComp(this)" required></div>
                    <div><label>Stitching</label><input type="number" class="inp-stitch" step="0.01" oninput="calcComp(this)"></div>
                    <div><label>Component Total</label><input type="number" class="res-comp-total" readonly></div>
                </div>
            </div>
        </div>
        <button type="button" class="btn-add" onclick="addComp()">+ Add Component</button>
        <div class="summary-box"><h3>Grand Total Cost: ₹<span id="gt-display">0.00</span></h3></div>
        <button type="submit" class="btn-submit">Save Outfit Cost</button>
    </form>

    <form id="outfit-price-form" class="tab-content">
        <div class="form-grid">
            <div><label>Select Outfit ID</label><select id="sel-outfit-id" onchange="calculatePriceMargins(this)" required><option value="">Choose ID</option></select></div>
            <div><label>Total Cost (Fetched)</label><input type="number" id="price-fetch-cost" readonly></div>
            <div class="full-width"><label>Outfit Name</label><input type="text" name="outfitName" required></div>
            <div class="full-width"><label>Outfit Photo</label><input type="file" accept="image/*"></div>
        </div>
        <div class="summary-box form-grid">
            <div><label>50% Profit Price (x2)</label><input type="number" id="p50" readonly></div>
            <div><label>60% Profit Price (/0.4)</label><input type="number" id="p60" readonly></div>
            <div><label>Final Price</label><input type="number" id="final-price" step="0.01" required></div>
            <div><label>20% Off Discount Price</label><input type="number" id="p-disc" readonly></div>
        </div>
        <button type="submit" class="btn-submit">Set Pricing</button>
    </form>

    <form id="investment-form" class="tab-content">
        <div class="form-grid">
            <div><label>Date</label><input type="date" class="current-date" required></div>
            <div><label>Category</label><select name="category" required>
                <option value="fabric">Fabric</option>
                <option value="shoot">Shoot</option>
                <option value="ad">Ad</option>
                <option value="delivery">Delivery</option>
                <option value="stitching">Stitching</option>
                <option value="others">Others</option>
            </select></div>
            <div class="full-width"><label>Description</label><textarea name="description" rows="3"></textarea></div>
            <div class="full-width"><label>Amount</label><input type="number" name="amount" step="0.01" required></div>
        </div>
        <button type="submit" class="btn-submit">Record Investment</button>
    </form>
</div>

<script>
    const ACCESS_CODE = "Nira2026"; 
    const userCode = prompt("Please enter the Access Code to use the Nira Portal:");

    if (userCode !== ACCESS_CODE) {
        alert("Incorrect code. Access denied.");
        document.body.innerHTML = "<h1 style='text-align:center; margin-top:100px;'>Unauthorized Access</h1>";
        throw new Error("Access Denied"); // This stops the rest of the script from running
    }
    const scriptURL = "https://script.google.com/macros/s/AKfycbzNSyQA96EFZvGoyiL9XR0rJeTn2BFqB3gYqc4KcVuYnwleYFt0EVIvcOIwejRLbtMYgQ/exec";
    let globalInventory = [];
    let globalOutfitCosts = [];

    // --- INITIALIZATION ---
    document.querySelectorAll('.current-date').forEach(el => el.valueAsDate = new Date());
    
    async function refreshData() {
        try {
            const response = await fetch(scriptURL);
            const data = await response.json();
            globalInventory = data.inventory;
            globalOutfitCosts = data.outfitCosts;
            updateDropdowns();
        } catch (e) { console.error("Data Sync Failed", e); }
    }
    refreshData();

    function showTab(t) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(t + '-form').classList.add('active');
        event.currentTarget.classList.add('active');
    }

    // --- CALCULATIONS ---
    function calcInvTotal() {
        const r = document.getElementById('inv-rate').value || 0;
        const m = document.getElementById('inv-meters').value || 0;
        document.getElementById('inv-total').value = (r * m).toFixed(2);
    }

    function fetchFabDetails(s) {
        const row = s.closest('.form-grid');
        const fab = globalInventory.find(item => item[0].toString() === s.value);
        if(fab) {
            row.querySelector('.res-name').value = fab[2];
            row.querySelector('.res-rate').value = fab[4];
        }
        calcComp(s);
    }

    function calcComp(e) {
        const row = e.closest('.form-grid');
        const total = (parseFloat(row.querySelector('.res-rate').value) || 0) * (parseFloat(row.querySelector('.inp-used').value) || 0) + (parseFloat(row.querySelector('.inp-stitch').value) || 0);
        row.querySelector('.res-comp-total').value = total.toFixed(2);
        updateGT();
    }

    function updateGT() {
        let total = 0;
        document.querySelectorAll('.res-comp-total').forEach(i => total += parseFloat(i.value) || 0);
        document.getElementById('gt-display').innerText = total.toFixed(2);
    }

    function calculatePriceMargins(s) {
        // Sum all rows in OutfitCost sheet matching this ID
        const totalCost = globalOutfitCosts
            .filter(row => row[0].toString() === s.value)
            .reduce((sum, row) => sum + (parseFloat(row[7]) || 0), 0);
        
        document.getElementById('price-fetch-cost').value = totalCost.toFixed(2);
        document.getElementById('p50').value = (totalCost * 2).toFixed(2);
        const p60Value = (totalCost / 0.4).toFixed(2);
        document.getElementById('p60').value = p60Value;
        document.getElementById('final-price').value = p60Value;
        document.getElementById('p-disc').value = (totalCost * 2).toFixed(2);
    }

    // --- FORM SUBMISSION ---
    const toBase64 = file => new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = () => resolve(reader.result);
        reader.onerror = error => reject(error);
    });

    document.querySelectorAll('form').forEach(form => {
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = form.querySelector('.btn-submit');
            btn.innerText = "Uploading to Nira...";
            btn.disabled = true;

            const payload = {
                sheetName: form.id.replace('-form', '').split('-').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(''),
                date: form.querySelector('.current-date')?.value
            };

            const fileInput = form.querySelector('input[type="file"]');
            if (fileInput?.files[0]) {
                payload.photoData = await toBase64(fileInput.files[0]);
                payload.photoName = fileInput.files[0].name;
            }

            // Field Mapping
            if (form.id === 'inventory-form') {
                payload.name = form.querySelector('[name="fabName"]').value;
                payload.rate = document.getElementById('inv-rate').value;
                payload.meters = document.getElementById('inv-meters').value;
                payload.total = document.getElementById('inv-total').value;
            } else if (form.id === 'outfit-cost-form') {
                payload.components = Array.from(document.querySelectorAll('.component-block')).map(b => ({
                    fabId: b.querySelector('select').value,
                    fabName: b.querySelector('.res-name').value,
                    rate: b.querySelector('.res-rate').value,
                    used: b.querySelector('.inp-used').value,
                    stitching: b.querySelector('.inp-stitch').value,
                    total: b.querySelector('.res-comp-total').value
                }));
            } else if (form.id === 'outfit-price-form') {
                payload.outfitId = document.getElementById('sel-outfit-id').value;
                payload.outfitName = form.querySelector('[name="outfitName"]').value;
                payload.cost = document.getElementById('price-fetch-cost').value;
                payload.p50 = document.getElementById('p50').value;
                payload.p60 = document.getElementById('p60').value;
                payload.final = document.getElementById('final-price').value;
                payload.pDisc = document.getElementById('p-disc').value;
            } else if (form.id === 'investment-form') {
                payload.category = form.querySelector('[name="category"]').value;
                payload.description = form.querySelector('[name="description"]').value;
                payload.amount = form.querySelector('[name="amount"]').value;
            }

            try {
                const res = await fetch(scriptURL, { method: 'POST', body: JSON.stringify(payload) });
                const out = await res.json();
                if(out.status === 'success') {
                    alert("Saved! Assigned ID: " + out.id);
                    form.reset();
                    refreshData();
                }
            } catch (err) { alert("Submission failed. Check console."); console.error(err); }
            finally { btn.innerText = "Save Record"; btn.disabled = false; }
        });
    });

    function addComp() {
        const list = document.getElementById('component-list');
        const clone = document.querySelector('.component-block').cloneNode(true);
        clone.querySelectorAll('input').forEach(i => i.value = '');
        list.appendChild(clone);
    }
    function removeComp(b) { if(document.querySelectorAll('.component-block').length > 1) b.closest('.component-block').remove(); updateGT(); }

    function updateDropdowns() {
        // Update Fabric Dropdowns
        document.querySelectorAll('.sel-fab').forEach(sel => {
            const currentVal = sel.value;
            sel.innerHTML = '<option value="">Select Fabric</option>';
            globalInventory.forEach(row => {
                const opt = new Option(`${row[0]} - ${row[2]}`, row[0]);
                sel.add(opt);
            });
            sel.value = currentVal;
        });

        // Update Outfit ID Dropdown
        const outSel = document.getElementById('sel-outfit-id');
        const uniqueOutfits = [...new Set(globalOutfitCosts.map(row => row[0].toString()))];
        outSel.innerHTML = '<option value="">Choose ID</option>';
        uniqueOutfits.forEach(id => {
            outSel.add(new Option(id, id));
        });
    }
</script>
</body>
</html>
